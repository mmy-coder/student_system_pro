# Student Hub — Docker Compose 本地部署
# 启动: docker compose up -d
# 停止: docker compose down
# 查看日志: docker compose logs -f

services:
  db:
    image: mysql:8.4
    container_name: student_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-example_root_password}
      MYSQL_DATABASE: ${DB_NAME:-student_pro_db}
    ports:
      - "3307:3306"  # 映射到 3307，避免和本机 MySQL 冲突
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    container_name: student_web
    restart: unless-stopped
    ports:
      - "8001:8000"  # 映射到 8001，避免和本机 FastAPI 冲突
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-example_root_password}
      DB_NAME: ${DB_NAME:-student_pro_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-student-hub-secret-key-change-in-production-2026}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
