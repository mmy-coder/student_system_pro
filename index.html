<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理系统 — 企业级数据平台</title>

    <!-- Fira Sans + Fira Code via Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ================================================================
           DESIGN TOKENS — OLED Dark + Glassmorphism
           ================================================================ */
        :root {
            --bg-deep: #020617;
            --bg-surface: #0F172A;
            --bg-elevated: #1E293B;
            --bg-muted: #1A1E2F;
            --border-subtle: rgba(51, 65, 85, 0.5);
            --border-default: #334155;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --accent: #22C55E;
            --accent-glow: rgba(34, 197, 94, 0.25);
            --accent-hover: #16A34A;
            --accent-blue: #3B82F6;
            --accent-blue-glow: rgba(59, 130, 246, 0.3);
            --destructive: #EF4444;
            --destructive-hover: #DC2626;
            --destructive-glow: rgba(239, 68, 68, 0.25);
            --warning: #F59E0B;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.4), 0 4px 16px rgba(0, 0, 0, 0.3);
            --shadow-elevated: 0 4px 8px rgba(0, 0, 0, 0.5), 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow-green: 0 0 20px var(--accent-glow);
            --shadow-glow-blue: 0 0 20px var(--accent-blue-glow);
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
            --font-body: 'Fira Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
        }

        /* ================================================================
           RESET & BASE
           ================================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 32px 16px 64px;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient background glow — subtle mesh gradient */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(34, 197, 94, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(15, 23, 42, 0.8) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle dot grid overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(51, 65, 85, 0.3) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 20%, transparent 70%);
        }

        .container {
            max-width: 1050px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ================================================================
           TYPOGRAPHY
           ================================================================ */
        h1 {
            font-family: var(--font-mono);
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 36px;
            background: linear-gradient(135deg, var(--text-primary) 0%, #94A3B8 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-family: var(--font-mono);
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        h3 {
            font-family: var(--font-body);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ================================================================
           GLASS CARD
           ================================================================ */
        .card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            margin-bottom: 18px;
            box-shadow: var(--shadow-card);
            transition: border-color var(--transition-base), box-shadow var(--transition-base);
        }

        .card:hover {
            border-color: rgba(51, 65, 85, 0.7);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .card-header .icon-wrapper {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card-header .icon-wrapper.accent {
            background: rgba(34, 197, 94, 0.12);
            color: var(--accent);
        }

        .card-header .icon-wrapper.blue {
            background: rgba(59, 130, 246, 0.12);
            color: var(--accent-blue);
        }

        /* ================================================================
           UTILITY
           ================================================================ */
        .hidden {
            display: none !important;
        }

        /* ================================================================
           INPUTS
           ================================================================ */
        input {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 11px 16px;
            color: var(--text-primary);
            font-size: 0.875rem;
            font-family: var(--font-body);
            outline: none;
            transition: all var(--transition-fast);
            width: 100%;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: rgba(30, 41, 59, 0.9);
        }

        /* ================================================================
           BUTTONS
           ================================================================ */
        button {
            border: none;
            border-radius: var(--radius-full);
            padding: 10px 22px;
            font-size: 0.875rem;
            font-family: var(--font-body);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            outline: none;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            line-height: 1.4;
        }

        button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #16A34A 100%);
            color: #fff;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .btn-primary:hover {
            box-shadow: var(--shadow-glow-green);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 1px 4px var(--accent-glow);
        }

        .btn-blue {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #2563EB 100%);
            color: #fff;
            box-shadow: 0 2px 8px var(--accent-blue-glow);
        }

        .btn-blue:hover {
            box-shadow: var(--shadow-glow-blue);
            transform: translateY(-1px);
        }

        .btn-blue:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--destructive) 0%, #DC2626 100%);
            color: #fff;
            box-shadow: 0 2px 8px var(--destructive-glow);
        }

        .btn-danger:hover {
            box-shadow: 0 0 24px rgba(239, 68, 68, 0.35);
            transform: translateY(-1px);
        }

        .btn-danger:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-secondary {
            background: rgba(51, 65, 85, 0.5);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
        }

        .btn-secondary:hover {
            background: rgba(51, 65, 85, 0.7);
            color: var(--text-primary);
            border-color: var(--border-default);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            padding: 8px 16px;
        }

        .btn-ghost:hover {
            background: rgba(51, 65, 85, 0.3);
            color: var(--text-primary);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
            border-radius: var(--radius-full);
        }

        .btn-xs {
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: var(--radius-full);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ================================================================
           AUTH BOX
           ================================================================ */
        .auth-box {
            max-width: 420px;
            margin: 80px auto 0;
            text-align: center;
        }

        .auth-box .logo-mark {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent), #16A34A);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow-green);
        }

        .auth-box input {
            margin-bottom: 12px;
        }

        .auth-box button {
            width: 100%;
            justify-content: center;
            margin-bottom: 10px;
            padding: 13px;
        }

        .auth-switch {
            color: var(--accent);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color var(--transition-fast);
            margin-top: 4px;
            display: inline-block;
        }

        .auth-switch:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-subtle);
        }

        /* ================================================================
           TOOLBAR
           ================================================================ */
        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .toolbar-left {
            display: flex;
            gap: 10px;
            align-items: center;
            flex: 1;
            min-width: 200px;
        }

        .toolbar-left input {
            max-width: 300px;
        }

        .toolbar-right {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ================================================================
           TABLE
           ================================================================ */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 8px;
            border-radius: var(--radius-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
            min-width: 750px;
        }

        thead th {
            padding: 14px 12px 14px 0;
            text-align: left;
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-subtle);
            white-space: nowrap;
        }

        thead th:last-child {
            text-align: right;
            padding-right: 4px;
        }

        tbody td {
            padding: 14px 12px 14px 0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.2);
            color: var(--text-secondary);
            transition: background var(--transition-fast);
        }

        tbody td:last-child {
            text-align: right;
            padding-right: 4px;
        }

        tbody tr {
            transition: background var(--transition-fast), transform var(--transition-fast);
        }

        tbody tr:hover td {
            background: rgba(30, 41, 59, 0.4);
            color: var(--text-primary);
        }

        /* ID badge */
        .id-badge {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
            padding: 2px 8px;
            border-radius: var(--radius-full);
        }

        /* Score badge */
        .score-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
            font-family: var(--font-mono);
        }

        .score-high {
            color: var(--accent);
        }

        .score-mid {
            color: var(--warning);
        }

        .score-low {
            color: var(--destructive);
        }

        /* Gender badge */
        .gender-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 500;
        }

        .gender-male {
            background: rgba(59, 130, 246, 0.12);
            color: #60A5FA;
        }

        .gender-female {
            background: rgba(236, 72, 153, 0.12);
            color: #F472B6;
        }

        .actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .empty-state .hint {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ================================================================
           PAGINATION
           ================================================================ */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 14px;
            margin-top: 22px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .pagination .page-indicator {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .pagination .page-indicator strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .pagination button {
            padding: 7px 16px;
            font-size: 0.8rem;
        }

        /* ================================================================
           MODAL OVERLAY
           ================================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn var(--transition-base) ease-out;
            padding: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-box {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 32px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-elevated);
            animation: slideUp var(--transition-slow) cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-box.wide {
            max-width: 560px;
            text-align: left;
        }

        .modal-box .modal-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .modal-box .modal-icon.danger {
            background: rgba(239, 68, 68, 0.12);
            color: var(--destructive);
        }

        .modal-box h3 {
            margin-bottom: 8px;
        }

        .modal-box p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 6px;
            line-height: 1.6;
        }

        .modal-box .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 22px;
        }

        .modal-box .btn-group.right {
            justify-content: flex-end;
        }

        /* Form grid in modal */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 18px 0;
        }

        .form-grid .span-2 {
            grid-column: span 2;
        }

        .form-grid label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* ================================================================
           TOAST NOTIFICATION
           ================================================================ */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: var(--radius-full);
            font-size: 0.875rem;
            font-weight: 500;
            z-index: 2000;
            pointer-events: none;
            animation: toastIn var(--transition-base) ease-out, toastOut var(--transition-base) var(--transition-slow) ease-in forwards;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .toast-success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ADE80;
            box-shadow: var(--shadow-glow-green);
        }

        .toast-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #F87171;
            box-shadow: 0 0 20px var(--destructive-glow);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-12px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-8px);
            }
        }

        /* ================================================================
           USER INFO BAR
           ================================================================ */
        .user-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-full);
            padding: 6px 16px 6px 6px;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .user-pill .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), #7C3AED);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
        }

        /* ================================================================
           RESPONSIVE
           ================================================================ */
        @media (max-width: 768px) {
            body {
                padding: 16px 12px 48px;
            }

            h1 {
                font-size: 1.4rem;
                margin-bottom: 24px;
            }

            .card {
                padding: 20px 16px;
                border-radius: var(--radius-md);
            }

            .toolbar {
                flex-direction: column;
                gap: 10px;
            }

            .toolbar-left {
                flex-direction: column;
                width: 100%;
            }

            .toolbar-left input {
                max-width: 100%;
            }

            .toolbar-right {
                width: 100%;
                justify-content: flex-start;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-grid .span-2 {
                grid-column: span 1;
            }

            tbody td,
            thead th {
                padding: 12px 6px 12px 0;
                font-size: 0.8rem;
            }

            .actions {
                flex-direction: column;
                gap: 4px;
            }

            .actions button {
                width: 100%;
                justify-content: center;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>学生数据管理平台</h1>

        <!-- Toast -->
        <div id="toast" class="toast hidden"></div>

        <!-- ==================== 登录/注册视图 ==================== -->
        <div id="authView" class="card auth-box">
            <div class="logo-mark">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                    <path d="M6 12v5c0 1.1 2.7 3 6 3s6-1.9 6-3v-5"/>
                </svg>
            </div>
            <h3 id="authTitle" style="margin-bottom:20px;">用户登录</h3>
            <input type="text" id="authUsername" placeholder="用户名" autocomplete="username">
            <input type="password" id="authPassword" placeholder="密码" autocomplete="current-password">
            <button class="btn-primary" id="authBtn" onclick="handleAuth()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                登录
            </button>
            <div class="auth-switch" id="authSwitch" onclick="toggleAuthMode()">还没有账号？去注册</div>
        </div>

        <!-- ==================== 主仪表盘视图 ==================== -->
        <div id="dashboardView" class="hidden">
            <!-- 工具栏 -->
            <div class="card">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input type="text" id="searchInput" placeholder="搜索学生姓名..." onkeydown="if(event.key==='Enter') loadStudents(1)">
                        <button class="btn-primary btn-sm" onclick="loadStudents(1)">搜索</button>
                    </div>
                    <div class="toolbar-right">
                        <button class="btn-primary btn-sm" onclick="exportCSV()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            导出
                        </button>
                        <button class="btn-blue btn-sm" onclick="showAddModal()">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                            添加学生
                        </button>
                        <button class="btn-danger btn-sm" id="batchDeleteBtn" onclick="batchDelete()" disabled>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            批量删除
                        </button>
                        <span class="user-pill">
                            <span class="avatar" id="userAvatar">U</span>
                            <span id="userNameLabel">用户</span>
                        </span>
                        <button class="btn-ghost btn-sm" onclick="handleLogout()" title="退出登录">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 数据统计 -->
            <div class="card" style="padding:20px 28px;">
                <div class="card-header" style="margin-bottom:16px;">
                    <div class="icon-wrapper blue">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    </div>
                    <h3 style="margin-bottom:0;">数据概览</h3>
                </div>
                <div style="display:flex;align-items:center;gap:32px;flex-wrap:wrap;">
                    <canvas id="pieChart" width="220" height="220" style="flex-shrink:0;"></canvas>
                    <div style="display:flex;flex-direction:column;gap:10px;min-width:180px;" id="pieLegend"></div>
                </div>
            </div>

            <!-- 数据表格 -->
            <div class="card" style="padding-bottom: 20px;">
                <div class="card-header">
                    <div class="icon-wrapper accent">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    </div>
                    <h3>学生数据</h3>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:36px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()" style="width:16px;height:16px;cursor:pointer;"></th>
                                <th>学号</th>
                                <th>姓名</th>
                                <th>年龄</th>
                                <th>性别</th>
                                <th>成绩</th>
                                <th>电话</th>
                                <th>班级</th>
                                <th>入学日期</th>
                                <th>地址</th>
                                <th>身高</th>
                                <th style="text-align:right;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody"></tbody>
                    </table>
                </div>
                <div id="emptyHint" class="empty-state hidden">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                    <p>暂无学生数据</p>
                    <p class="hint">点击「添加学生」录入第一条数据</p>
                </div>
                <div class="pagination">
                    <button class="btn-secondary btn-sm" id="prevPageBtn" onclick="changePage(-1)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                        上一页
                    </button>
                    <span class="page-indicator" id="pageInfo">第 <strong>1</strong> / <strong>1</strong> 页</span>
                    <button class="btn-secondary btn-sm" id="nextPageBtn" onclick="changePage(1)">
                        下一页
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 删除确认弹窗 ==================== -->
    <div id="deleteModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-icon danger">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <h3>确认删除</h3>
            <p>确定要永久删除该学生信息吗？此操作不可撤销。</p>
            <div class="btn-group">
                <button class="btn-secondary" onclick="closeDeleteModal()">取消</button>
                <button class="btn-danger" id="confirmDeleteBtn">确认删除</button>
            </div>
        </div>
    </div>

    <!-- ==================== 添加/修改学生弹窗 ==================== -->
    <div id="studentModal" class="modal-overlay hidden">
        <div class="modal-box wide">
            <div class="card-header" style="margin-bottom:4px;">
                <div class="icon-wrapper blue">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
                </div>
                <h3 id="modalTitle">添加学生</h3>
            </div>
            <input type="hidden" id="editStudentId">
            <div class="form-grid">
                <div>
                    <label>姓名</label>
                    <input type="text" id="sName" placeholder="例如：张三">
                </div>
                <div>
                    <label>年龄</label>
                    <input type="number" id="sAge" placeholder="例如：20" min="1" max="150">
                </div>
                <div>
                    <label>性别</label>
                    <input type="text" id="sGender" placeholder="男 / 女">
                </div>
                <div>
                    <label>成绩</label>
                    <input type="number" step="0.1" id="sScore" placeholder="例如：88.5" min="0" max="100">
                </div>
                <div>
                    <label>电话</label>
                    <input type="text" id="sPhone" placeholder="例如：13800138000">
                </div>
                <div>
                    <label>班级</label>
                    <input type="text" id="sClass" placeholder="例如：高三(1)班">
                </div>
                <div>
                    <label>入学日期</label>
                    <input type="date" id="sEnrollDate">
                </div>
                <div>
                    <label>身高 (cm)</label>
                    <input type="number" id="sHeight" placeholder="例如：175.0" min="0" max="300" step="0.1">
                </div>
                <div class="span-2">
                    <label>地址</label>
                    <input type="text" id="sAddress" placeholder="例如：北京市朝阳区">
                </div>
            </div>
            <div class="btn-group right">
                <button class="btn-secondary" onclick="closeStudentModal()">取消</button>
                <button class="btn-primary" onclick="saveStudent()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 核心状态管理 ====================
        let currentPage = 1;
        let pageSize = 5;
        let totalPages = 1;
        let currentUserId = null;
        let deleteTargetId = null;
        let selectedIds = new Set();

        const API = '';

        // 检查登录状态
        document.addEventListener('DOMContentLoaded', () => {
            const user_id = localStorage.getItem('user_id');
            const username = localStorage.getItem('username');
            if (user_id) {
                currentUserId = parseInt(user_id);
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('dashboardView').classList.remove('hidden');
                updateUserPill(username || '用户');
                loadStudents(1);
                loadStats();
            }

            // 点击弹窗遮罩关闭
            document.getElementById('deleteModal').addEventListener('click', function(e) {
                if (e.target === this) closeDeleteModal();
            });
            document.getElementById('studentModal').addEventListener('click', function(e) {
                if (e.target === this) closeStudentModal();
            });
        });

        function updateUserPill(name) {
            document.getElementById('userNameLabel').innerText = name;
            document.getElementById('userAvatar').innerText = (name || 'U').charAt(0).toUpperCase();
        }

        // ==================== Toast ====================
        let toastTimer;

        function showToast(text, type) {
            const el = document.getElementById('toast');
            clearTimeout(toastTimer);
            el.className = 'toast ' + (type === 'success' ? 'toast-success' : 'toast-error');
            // SVG icons via innerHTML (safe, no user data), then text via textContent to prevent XSS
            el.innerHTML = type === 'success'
                ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
                : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
            el.appendChild(document.createTextNode(text));
            el.classList.remove('hidden');
            toastTimer = setTimeout(() => {
                el.classList.add('hidden');
            }, 3200);
        }

        // ==================== 认证模块 ====================
        let isRegisterMode = false;

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('authTitle').innerText = isRegisterMode ? '注册新账号' : '用户登录';
            document.getElementById('authBtn').innerHTML = isRegisterMode
                ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> 注册'
                : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 登录';
            document.getElementById('authSwitch').innerText = isRegisterMode ? '已有账号？去登录' : '还没有账号？去注册';
        }

        async function handleAuth() {
            const u = document.getElementById('authUsername').value.trim();
            const p = document.getElementById('authPassword').value.trim();
            if (!u || !p) return showToast('请填写用户名和密码', 'error');

            const url = isRegisterMode ? '/register' : '/login';
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if (res.ok) {
                if (isRegisterMode) {
                    showToast('注册成功！请登录', 'success');
                    toggleAuthMode();
                } else {
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    currentUserId = data.user_id;
                    updateUserPill(data.username);
                    document.getElementById('authView').classList.add('hidden');
                    document.getElementById('dashboardView').classList.remove('hidden');
                    showToast(`欢迎回来，${data.username}`, 'success');
                    loadStudents(1);
                    loadStats();
                }
            } else {
                showToast(data.detail || '操作失败', 'error');
            }
        }

        function handleLogout() {
            localStorage.removeItem('user_id');
            localStorage.removeItem('username');
            currentUserId = null;
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('authView').classList.remove('hidden');
            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
            showToast('已安全退出', 'success');
        }

        // ==================== 数据操作模块 ====================
        async function loadStudents(page) {
            if (!currentUserId) return;
            try {
            const keyword = document.getElementById('searchInput').value.trim();
            const res = await fetch(`${API}/students/?user_id=${currentUserId}&page=${page}&size=${pageSize}&keyword=${encodeURIComponent(keyword)}`);
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                showToast(err.detail || '加载学生数据失败', 'error');
                return;
            }
            const result = await res.json();
            const tbody = document.getElementById('studentTableBody');
            const emptyHint = document.getElementById('emptyHint');
            tbody.innerHTML = '';

            if (!result.data || result.data.length === 0) {
                emptyHint.classList.remove('hidden');
                tbody.innerHTML = '';
            } else {
                emptyHint.classList.add('hidden');
                result.data.forEach(s => {
                    const scoreClass = s.score >= 85 ? 'score-high' : s.score >= 60 ? 'score-mid' : 'score-low';
                    const genderClass = s.gender === '男' ? 'gender-male' : s.gender === '女' ? 'gender-female' : '';
                    const escapedName = s.name.replace(/'/g, "\\'");
                    const escapedGender = s.gender.replace(/'/g, "\\'");
                    const escapedPhone = (s.phone || '').replace(/'/g, "\\'");
                    const escapedClass = (s.class_name || '').replace(/'/g, "\\'");
                    const escapedAddr = (s.address || '').replace(/'/g, "\\'");
                    const enrollDate = s.enrollment_date || '';
                    const checked = selectedIds.has(s.id) ? 'checked' : '';
                    tbody.innerHTML += `
                        <tr>
                            <td><input type="checkbox" class="row-checkbox" value="${s.id}" ${checked} onchange="onCheckChange()" style="width:16px;height:16px;cursor:pointer;"></td>
                            <td><span class="id-badge">#${s.id}</span></td>
                            <td style="color:var(--text-primary);font-weight:500;">${s.name}</td>
                            <td>${s.age}</td>
                            <td><span class="gender-badge ${genderClass}">${s.gender || '-'}</span></td>
                            <td><span class="score-badge ${scoreClass}">${s.score}</span></td>
                            <td>${s.phone || '<span style="color:var(--text-muted)">-</span>'}</td>
                            <td>${s.class_name || '<span style="color:var(--text-muted)">-</span>'}</td>
                            <td style="white-space:nowrap;">${enrollDate || '<span style="color:var(--text-muted)">-</span>'}</td>
                            <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${(s.address||'').replace(/"/g, '&quot;')}">${s.address || '<span style="color:var(--text-muted)">-</span>'}</td>
                            <td>${s.height ? s.height + ' cm' : '<span style="color:var(--text-muted)">-</span>'}</td>
                            <td class="actions">
                                <button class="btn-blue btn-xs" onclick="openEditModal(${s.id}, '${escapedName}', ${s.age}, '${escapedGender}', ${s.score}, '${escapedPhone}', '${escapedClass}', '${enrollDate}', '${escapedAddr}', ${s.height || 'null'})">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                    编辑
                                </button>
                                <button class="btn-danger btn-xs" onclick="openDeleteModal(${s.id})">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                    删除
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }

            currentPage = result.page;
            totalPages = Math.ceil(result.total / pageSize) || 1;
            document.getElementById('pageInfo').innerHTML = `第 <strong>${currentPage}</strong> / <strong>${totalPages}</strong> 页`;
            document.getElementById('prevPageBtn').disabled = currentPage <= 1;
            document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
            } catch (e) {
                showToast('网络错误，无法加载数据: ' + e.message, 'error');
            }
        }

        function changePage(step) {
            const next = currentPage + step;
            if (next >= 1 && next <= totalPages) loadStudents(next);
        }

        // ==================== 删除确认模块 ====================
        function openDeleteModal(id) {
            deleteTargetId = id;
            document.getElementById('deleteModal').classList.remove('hidden');
            document.getElementById('confirmDeleteBtn').onclick = async () => {
                const res = await fetch(`${API}/students/${deleteTargetId}?user_id=${currentUserId}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('删除成功！', 'success');
                    closeDeleteModal();
                    loadStudents(currentPage);
                } else {
                    showToast('删除失败', 'error');
                }
            };
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
            deleteTargetId = null;
        }

        // ==================== 添加/修改模块 ====================
        function showAddModal() {
            document.getElementById('modalTitle').innerText = '添加学生';
            document.getElementById('editStudentId').value = '';
            ['sName', 'sAge', 'sGender', 'sScore', 'sPhone', 'sClass', 'sEnrollDate', 'sAddress', 'sHeight'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('studentModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('sName').focus(), 100);
        }

        function openEditModal(id, name, age, gender, score, phone, className, enrollDate, address, height) {
            document.getElementById('modalTitle').innerText = '修改学生信息';
            document.getElementById('editStudentId').value = id;
            document.getElementById('sName').value = name;
            document.getElementById('sAge').value = age;
            document.getElementById('sGender').value = gender;
            document.getElementById('sScore').value = score;
            document.getElementById('sPhone').value = phone === 'null' ? '' : phone;
            document.getElementById('sClass').value = className === 'null' ? '' : className;
            document.getElementById('sEnrollDate').value = enrollDate === 'null' ? '' : enrollDate;
            document.getElementById('sAddress').value = address;
            document.getElementById('sHeight').value = height === 'null' ? '' : height;
            document.getElementById('studentModal').classList.remove('hidden');
        }

        function closeStudentModal() {
            document.getElementById('studentModal').classList.add('hidden');
        }

        async function saveStudent() {
            const id = document.getElementById('editStudentId').value;
            const data = {
                name: document.getElementById('sName').value.trim(),
                age: parseInt(document.getElementById('sAge').value),
                gender: document.getElementById('sGender').value.trim(),
                score: parseFloat(document.getElementById('sScore').value),
                phone: document.getElementById('sPhone').value.trim(),
                class_name: document.getElementById('sClass').value.trim(),
                enrollment_date: document.getElementById('sEnrollDate').value || null,
                address: document.getElementById('sAddress').value.trim(),
                height: document.getElementById('sHeight').value ? parseFloat(document.getElementById('sHeight').value) : null
            };
            if (!data.name || !data.age || !data.gender || isNaN(data.score))
                return showToast('请完整填写姓名、年龄、性别、成绩', 'error');

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API}/students/${id}?user_id=${currentUserId}` : `${API}/students/?user_id=${currentUserId}`;
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                showToast(id ? '修改成功！' : '添加成功！', 'success');
                closeStudentModal();
                loadStudents(currentPage);
            } else {
                const err = await res.json();
                showToast(err.detail || '操作失败', 'error');
            }
        }

        // ==================== 复选框 / 批量操作 ====================
        function toggleSelectAll() {
            const master = document.getElementById('selectAll');
            const boxes = document.querySelectorAll('.row-checkbox');
            boxes.forEach(cb => {
                cb.checked = master.checked;
                const id = parseInt(cb.value);
                if (master.checked) selectedIds.add(id);
                else selectedIds.delete(id);
            });
            updateBatchDeleteBtn();
        }

        function onCheckChange() {
            const boxes = document.querySelectorAll('.row-checkbox');
            selectedIds.clear();
            boxes.forEach(cb => {
                if (cb.checked) selectedIds.add(parseInt(cb.value));
            });
            document.getElementById('selectAll').checked = boxes.length > 0 && selectedIds.size === boxes.length;
            updateBatchDeleteBtn();
        }

        function updateBatchDeleteBtn() {
            const btn = document.getElementById('batchDeleteBtn');
            btn.disabled = selectedIds.size === 0;
            btn.innerText = selectedIds.size > 0 ? `批量删除 (${selectedIds.size})` : '批量删除';
        }

        // ==================== 导出 CSV ====================
        function exportCSV() {
            const keyword = document.getElementById('searchInput').value.trim();
            const url = `${API}/students/export/?user_id=${currentUserId}&keyword=${encodeURIComponent(keyword)}`;
            window.open(url, '_blank');
        }

        // ==================== 批量删除 ====================
        async function batchDelete() {
            if (selectedIds.size === 0) return;
            if (!confirm(`确定要永久删除选中的 ${selectedIds.size} 名学生吗？此操作不可撤销。`)) return;
            const ids = [...selectedIds].join(',');
            const res = await fetch(`${API}/students/batch/?user_id=${currentUserId}&ids=${encodeURIComponent(ids)}`, { method: 'DELETE' });
            if (res.ok) {
                const data = await res.json();
                showToast(data.message, 'success');
                selectedIds.clear();
                document.getElementById('selectAll').checked = false;
                updateBatchDeleteBtn();
                loadStudents(currentPage);
                loadStats();
            } else {
                const err = await res.json();
                showToast(err.detail || '操作失败', 'error');
            }
        }

        // ==================== 数据统计（饼图） ====================
        const PIE_COLORS = ['#3B82F6', '#F472B6', '#22C55E', '#F59E0B', '#EF4444', '#8B5CF6'];

        async function loadStats() {
            if (!currentUserId) return;
            try {
                const res = await fetch(`${API}/stats/?user_id=${currentUserId}`);
                if (res.ok) {
                    const s = await res.json();
                    drawPie(s);
                    buildLegend(s);
                }
            } catch (e) {
                // 统计加载失败不弹 toast，避免干扰
                console.error('加载统计失败:', e);
            }
        }

        function drawPie(stats) {
            const canvas = document.getElementById('pieChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2, cy = canvas.height / 2;
            const outerR = 90, innerR = 50; // donut

            const slices = [
                { label: '男生', value: stats.male, color: '#60A5FA' },
                { label: '女生', value: stats.female, color: '#F472B6' },
            ].filter(s => s.value > 0);

            const total = slices.reduce((a, b) => a + b.value, 0);
            if (total === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#64748B';
                ctx.font = '14px "Fira Sans", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('暂无数据', cx, cy);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let angle = -Math.PI / 2; // start from top
            slices.forEach(s => {
                const sliceAngle = (s.value / total) * Math.PI * 2;
                // Outer arc
                ctx.beginPath();
                ctx.moveTo(cx + innerR * Math.cos(angle), cy + innerR * Math.sin(angle));
                ctx.arc(cx, cy, outerR, angle, angle + sliceAngle);
                ctx.arc(cx, cy, innerR, angle + sliceAngle, angle, true);
                ctx.closePath();
                ctx.fillStyle = s.color;
                ctx.fill();
                angle += sliceAngle;
            });

            // Center text
            ctx.fillStyle = '#F8FAFC';
            ctx.font = 'bold 28px "Fira Sans", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(total, cx, cy - 6);
            ctx.font = '12px "Fira Sans", sans-serif';
            ctx.fillStyle = '#94A3B8';
            ctx.fillText('总人数', cx, cy + 16);
        }

        function buildLegend(stats) {
            const el = document.getElementById('pieLegend');
            const items = [
                { label: '男生', value: stats.male, color: '#60A5FA' },
                { label: '女生', value: stats.female, color: '#F472B6' },
                { label: '平均分', value: stats.avg_score + '分', color: '#22C55E' },
                { label: '优秀 (≥85)', value: stats.excellent + '人', color: '#F59E0B' },
                { label: '不及格 (<60)', value: stats.failed + '人', color: '#EF4444' },
            ];
            el.innerHTML = items.map((it, i) => `
                <div style="display:flex;align-items:center;gap:10px;">
                    <span style="width:12px;height:12px;border-radius:3px;background:${it.color};flex-shrink:0;"></span>
                    <span style="color:var(--text-secondary);font-size:0.85rem;flex:1;">${it.label}</span>
                    <span style="color:var(--text-primary);font-weight:600;font-size:0.9rem;">${it.value}</span>
                </div>
            `).join('');
        }

        // ==================== 键盘快捷键 ====================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (!document.getElementById('deleteModal').classList.contains('hidden')) closeDeleteModal();
                if (!document.getElementById('studentModal').classList.contains('hidden')) closeStudentModal();
            }
        });
    </script>
</body>
