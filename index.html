<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业级学生管理系统</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: #000;
            color: #f5f5f7;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
        }

        /* 卡片样式 */
        .card {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 18px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* 输入与按钮 */
        input,
        button {
            background: #2c2c2e;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            color: #f5f5f7;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            outline: 2px solid #0071e3;
        }

        .btn-primary {
            background: #0071e3;
            color: #fff;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #0077ed;
        }

        .btn-danger {
            background: #ff453a;
            cursor: pointer;
        }

        .btn-secondary {
            background: #3a3a3c;
            cursor: pointer;
        }

        /* 登录/注册区 */
        .auth-box {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }

        .auth-box input {
            width: 100%;
            margin-bottom: 12px;
        }

        .auth-box button {
            width: 100%;
            margin-bottom: 8px;
        }

        .auth-switch {
            color: #0071e3;
            cursor: pointer;
            font-size: 14px;
            text-decoration: underline;
        }

        /* 搜索与分页 */
        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .search-area {
            display: flex;
            gap: 10px;
        }

        .search-area input {
            min-width: 200px;
        }

        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            font-size: 14px;
        }

        .pagination button {
            padding: 6px 16px;
            background: #3a3a3c;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 学生表格 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 15px;
        }

        th,
        td {
            padding: 16px 8px 16px 0;
            border-bottom: 1px solid #2c2c2e;
            text-align: left;
        }

        th {
            color: #8e8e93;
            font-weight: 500;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .actions button {
            padding: 4px 12px;
            font-size: 12px;
        }

        /* 删除确认弹窗（Modal） */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: #1c1c1e;
            padding: 30px;
            border-radius: 18px;
            max-width: 400px;
            text-align: center;
        }

        .modal-box h3 {
            margin-bottom: 12px;
        }

        .modal-box .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .message {
            text-align: center;
            margin: 10px 0;
            display: none;
        }

        .msg-success {
            color: #88d9a2;
            display: block;
        }

        .msg-error {
            color: #ff8585;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📚 企业级学生管理系统</h1>
        <div id="message" class="message"></div>

        <!-- 登录/注册视图 -->
        <div id="authView" class="card auth-box">
            <h3 id="authTitle">用户登录</h3>
            <input type="text" id="authUsername" placeholder="用户名">
            <input type="password" id="authPassword" placeholder="密码">
            <button class="btn-primary" id="authBtn" onclick="handleAuth()">登录</button>
            <div class="auth-switch" id="authSwitch" onclick="toggleAuthMode()">还没有账号？去注册</div>
        </div>

        <!-- 主仪表盘视图 -->
        <div id="dashboardView" class="hidden">
            <div class="card">
                <div class="toolbar">
                    <div class="search-area">
                        <input type="text" id="searchInput" placeholder="搜索学生姓名..."
                            onkeydown="if(event.key==='Enter') loadStudents(1)">
                        <button class="btn-primary" onclick="loadStudents(1)">搜索</button>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-primary" onclick="showAddModal()">➕ 添加学生</button>
                        <button class="btn-secondary" onclick="handleLogout()">退出登录</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>学号</th>
                            <th>姓名</th>
                            <th>年龄</th>
                            <th>性别</th>
                            <th>成绩</th>
                            <th>地址</th>
                            <th>身高</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
                <div class="pagination">
                    <button id="prevPageBtn" onclick="changePage(-1)">上一页</button>
                    <span id="pageInfo">第 1 / 1 页</span>
                    <button id="nextPageBtn" onclick="changePage(1)">下一页</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="deleteModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3>⚠️ 确认删除</h3>
            <p>确定要永久删除该学生信息吗？此操作不可撤销。</p>
            <div class="btn-group">
                <button class="btn-secondary" onclick="closeDeleteModal()">取消</button>
                <button class="btn-danger" id="confirmDeleteBtn">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 添加/修改 学生弹窗 -->
    <div id="studentModal" class="modal-overlay hidden">
        <div class="modal-box" style="max-width: 500px; text-align: left;">
            <h3 id="modalTitle">添加学生</h3>
            <input type="hidden" id="editStudentId">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0;">
                <input type="text" id="sName" placeholder="姓名">
                <input type="number" id="sAge" placeholder="年龄">
                <input type="text" id="sGender" placeholder="性别">
                <input type="number" step="0.1" id="sScore" placeholder="成绩">
                <input type="text" id="sAddress" placeholder="地址" style="grid-column: span 2;">
                <input type="number" id="sHeight" placeholder="身高(cm)" style="grid-column: span 2;">
            </div>
            <div class="btn-group" style="justify-content: flex-end;">
                <button class="btn-secondary" onclick="closeStudentModal()">取消</button>
                <button class="btn-primary" onclick="saveStudent()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 核心状态管理 ====================
        let currentPage = 1;
        let pageSize = 5;
        let totalPages = 1;
        let currentUserId = null;
        let deleteTargetId = null;

        const API = '';

        // 检查登录状态
        document.addEventListener('DOMContentLoaded', () => {
            const user_id = localStorage.getItem('user_id');
            if (user_id) {
                currentUserId = parseInt(user_id);
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('dashboardView').classList.remove('hidden');
                loadStudents(1);
            }
        });

        // ==================== 认证模块 ====================
        let isRegisterMode = false;
        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('authTitle').innerText = isRegisterMode ? '注册新账号' : '用户登录';
            document.getElementById('authBtn').innerText = isRegisterMode ? '注册' : '登录';
            document.getElementById('authSwitch').innerText = isRegisterMode ? '已有账号？去登录' : '还没有账号？去注册';
        }

        async function handleAuth() {
            const u = document.getElementById('authUsername').value.trim();
            const p = document.getElementById('authPassword').value.trim();
            if (!u || !p) return showMsg('请填写用户名和密码', 'error');

            const url = isRegisterMode ? '/register' : '/login';
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if (res.ok) {
                if (isRegisterMode) {
                    showMsg('注册成功！请登录', 'success');
                    toggleAuthMode();
                } else {
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    currentUserId = data.user_id;
                    document.getElementById('authView').classList.add('hidden');
                    document.getElementById('dashboardView').classList.remove('hidden');
                    showMsg(`欢迎回来，${data.username}`, 'success');
                    loadStudents(1);
                }
            } else {
                showMsg(data.detail || '操作失败', 'error');
            }
        }

        function handleLogout() {
            localStorage.removeItem('user_id');
            localStorage.removeItem('username');
            currentUserId = null;
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('authView').classList.remove('hidden');
            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
        }

        // ==================== 数据操作模块 ====================
        async function loadStudents(page) {
            if (!currentUserId) return;
            const keyword = document.getElementById('searchInput').value.trim();
            const res = await fetch(`${API}/students/?user_id=${currentUserId}&page=${page}&size=${pageSize}&keyword=${encodeURIComponent(keyword)}`);
            const result = await res.json();
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = '';
            result.data.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td>${s.id}</td>
                        <td>${s.name}</td>
                        <td>${s.age}</td>
                        <td>${s.gender}</td>
                        <td>${s.score}</td>
                        <td>${s.address || '-'}</td>
                        <td>${s.height ? s.height + 'cm' : '-'}</td>
                        <td class="actions">
                            <button class="btn-primary" onclick="openEditModal(${s.id}, '${s.name}', ${s.age}, '${s.gender}', ${s.score}, '${s.address || ''}', ${s.height || 'null'})">编辑</button>
                            <button class="btn-danger" onclick="openDeleteModal(${s.id})">删除</button>
                        </td>
                    </tr>
                `;
            });
            currentPage = result.page;
            totalPages = Math.ceil(result.total / pageSize) || 1;
            document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${totalPages} 页`;
            document.getElementById('prevPageBtn').disabled = currentPage <= 1;
            document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
            showMsg(`共 ${result.total} 条数据`, 'success');
        }

        function changePage(step) {
            const next = currentPage + step;
            if (next >= 1 && next <= totalPages) loadStudents(next);
        }

        // ==================== 删除确认模块（企业级） ====================
        function openDeleteModal(id) {
            deleteTargetId = id;
            document.getElementById('deleteModal').classList.remove('hidden');
            document.getElementById('confirmDeleteBtn').onclick = async () => {
                const res = await fetch(`${API}/students/${deleteTargetId}?user_id=${currentUserId}`, { method: 'DELETE' });
                if (res.ok) {
                    showMsg('删除成功！', 'success');
                    closeDeleteModal();
                    loadStudents(currentPage);
                } else {
                    showMsg('删除失败', 'error');
                }
            };
        }
        function closeDeleteModal() { document.getElementById('deleteModal').classList.add('hidden'); deleteTargetId = null; }

        // ==================== 添加/修改模块 ====================
        function showAddModal() {
            document.getElementById('modalTitle').innerText = '添加学生';
            document.getElementById('editStudentId').value = '';
            ['sName', 'sAge', 'sGender', 'sScore', 'sAddress', 'sHeight'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('studentModal').classList.remove('hidden');
        }

        function openEditModal(id, name, age, gender, score, address, height) {
            document.getElementById('modalTitle').innerText = '修改信息';
            document.getElementById('editStudentId').value = id;
            document.getElementById('sName').value = name;
            document.getElementById('sAge').value = age;
            document.getElementById('sGender').value = gender;
            document.getElementById('sScore').value = score;
            document.getElementById('sAddress').value = address;
            document.getElementById('sHeight').value = height === 'null' ? '' : height;
            document.getElementById('studentModal').classList.remove('hidden');
        }
        function closeStudentModal() { document.getElementById('studentModal').classList.add('hidden'); }

        async function saveStudent() {
            const id = document.getElementById('editStudentId').value;
            const data = {
                name: document.getElementById('sName').value.trim(),
                age: parseInt(document.getElementById('sAge').value),
                gender: document.getElementById('sGender').value.trim(),
                score: parseFloat(document.getElementById('sScore').value),
                address: document.getElementById('sAddress').value.trim(),
                height: document.getElementById('sHeight').value ? parseFloat(document.getElementById('sHeight').value) : null
            };
            if (!data.name || !data.age || !data.gender || isNaN(data.score)) return showMsg('请完整填写核心信息', 'error');

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API}/students/${id}?user_id=${currentUserId}` : `${API}/students/?user_id=${currentUserId}`;
            const res = await fetch(url, {
                method, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                showMsg(id ? '修改成功！' : '添加成功！', 'success');
                closeStudentModal();
                loadStudents(currentPage);
            } else {
                const err = await res.json();
                showMsg(err.detail || '操作失败', 'error');
            }
        }

        // ==================== 工具模块 ====================
        function showMsg(text, type) {
            const el = document.getElementById('message');
            el.innerText = text;
            el.className = 'message ' + (type === 'success' ? 'msg-success' : 'msg-error');
            setTimeout(() => { el.className = 'message'; el.innerText = ''; }, 4000);
        }
    </script>
</body>

</html>
